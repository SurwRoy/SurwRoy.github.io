{% extends "base.html" %}
{% block title %}{{ 'แก้ไข' if owner else 'เพิ่ม' }}เจ้าของ/ผู้เช่า{% endblock %}

{% block content %}
<div class="page-header">
    <h4><i class="fas fa-user-plus me-2 text-primary"></i>{{ 'แก้ไข' if owner else 'เพิ่ม' }}เจ้าของ/ผู้เช่า</h4>
</div>

<div class="card" style="max-width:600px">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">ห้อง <span class="text-danger">*</span></label>
                    <select name="room_id" class="form-select" required>
                        {% for r in rooms %}
                        <option value="{{ r.id }}" {{ 'selected' if owner and owner.room_id == r.id }}>
                            {{ r.building_name }} - ห้อง {{ r.room_number }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">ชื่อเจ้าของ / บริษัท <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control"
                           value="{{ owner.name if owner else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">ประเภท</label>
                    <select name="owner_type" class="form-select">
                        {% for t in ['เจ้าของ','ผู้เช่า'] %}
                        <option value="{{ t }}" {{ 'selected' if owner and owner.owner_type == t }}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">เบอร์โทร</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ owner.phone if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">อีเมล</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ owner.email if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">วันที่เข้าอยู่</label>
                    <input type="date" name="move_in_date" class="form-control"
                           value="{{ owner.move_in_date if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">หมายเหตุ</label>
                    <input type="text" name="note" class="form-control"
                           value="{{ owner.note if owner else '' }}">
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> บันทึก
                </button>
                <a href="{{ url_for('buildings_list') }}" class="btn btn-outline-secondary">ยกเลิก</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
